<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Ano'ng Uulamin Ko? - Random ulam picker para sa mga boarding house residents. Spin the roulette and discover your next meal! Created by Samael.">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Ano'ng Uulamin Ko? — Ulam Picker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta property="og:title" content="Ano'ng Uulamin Ko? — Ulam Picker">
  <meta property="og:description" content="Hirap mamili ng ulam? I-roulette mo na! Random ulam picker para sa mga boarding house residents. Created by Samael.">
  <meta property="og:image" content="data/think.png">
  <meta property="og:image:width" content="400">
  <meta property="og:image:height" content="300">
  <meta property="og:url" content="">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ano'ng Uulamin Ko? — Ulam Picker">
  <meta name="twitter:description" content="Hirap mamili ng ulam? I-roulette mo na! Random ulam picker para sa mga boarding house residents.">
  <meta name="twitter:image" content="data/think.png">
  <link rel="preload" href="data/think.png" as="image">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF6B35' stroke-width='2' stroke-linecap='round'%3E%3Ccircle cx='10' cy='12' r='7'/%3E%3Cpath d='M16 12l6-3'/%3E%3C/svg%3E" type="image/svg+xml">
</head>
<body>

  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <!-- ─── SPLASH SCREEN ─── -->
  <section id="splashScreen" class="screen active" aria-label="Welcome">
    <div class="floating-shapes" aria-hidden="true"></div>

    <div class="splash-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10" cy="12" r="7"/>
        <path d="M16 12l6-3"/>
      </svg>
    </div>
    <h1 class="splash-title">Ano'ng Uulamin<br>Ko?</h1>
    <p class="splash-subtitle">Hirap mamili? Kami na bahala.</p>
    <button id="splashBtn" class="splash-btn" aria-label="Start picking ulam">START</button>
    <button id="skipIntro" class="skip-intro">Skip intro</button>
  </section>

  <!-- ─── MAIN SCREEN ─── -->
  <section id="mainScreen" class="screen" aria-label="Ulam Picker">

    <header class="main-header">
      <span class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="12" r="7"/>
          <path d="M16 12l6-3"/>
        </svg>
      </span>
      <h1>Ano'ng Uulamin Ko?</h1>
    </header>

    <main class="main-content">

      <!-- Display Area -->
      <div class="display-area" role="img" aria-label="Ulam display">
        <img id="displayImage" src="data/think.png" alt="Ulam Picker" loading="lazy">

        <!-- Roulette -->
        <div id="rouletteContainer" class="roulette-container" aria-live="polite" aria-label="Spinning ulam roulette">
          <div class="roulette-window">
            <div id="rouletteTrack" class="roulette-track"></div>
          </div>
        </div>

        <!-- Result Overlay -->
        <div id="resultOverlay" class="result-overlay" role="alert" aria-live="assertive">
          <div class="result-card">
            <span class="result-icon" id="resultIcon" aria-hidden="true"></span>
            <p class="result-label" id="resultLabel"></p>
            <p class="result-name" id="resultName"></p>
          </div>
        </div>
      </div>

      <!-- Status Message -->
      <p class="status-message" id="statusMsg" aria-live="polite">Handa ka na ba? Pindutin ang SPIN!</p>

      <!-- Spin Button -->
      <button id="spinBtn" class="spin-btn" aria-label="Spin the roulette">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
          <circle cx="15" cy="15" r="1.5" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
        </svg>
        SPIN
      </button>

      <!-- Divider -->
      <div class="section-divider" aria-hidden="true"></div>

      <!-- History -->
      <div class="history-section" aria-label="Recent picks">
        <p class="history-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <circle cx="4" cy="6" r="1" fill="currentColor"/>
            <circle cx="4" cy="12" r="1" fill="currentColor"/>
            <circle cx="4" cy="18" r="1" fill="currentColor"/>
          </svg>
          Napiling Ulam
        </p>
        <div id="historyList" class="history-list"></div>
      </div>

    </main>

    <footer class="main-footer">
      <span>Ano'ng Uulamin Ko? &mdash; Random Ulam Picker</span>
      <br>
      <small>
    Created by
    <a href="https://samaelcode.vercel.app" target="_blank" rel="noopener noreferrer">
        Samael
    </a>
</small>
    </footer>

  </section>

  <script defer src="js/app.js"></script>
</body>
</html>
